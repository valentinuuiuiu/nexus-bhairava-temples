<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👁️ ASHTA BHAIRAVA — NewZyon World Monitor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap');

  :root {
    --void: #000005;
    --deep: #03001a;
    --cosmic: #060022;
    --fire: #ff4500;
    --gold: #ffd700;
    --sacred: #c084fc;
    --cyan: #00f5ff;
    --green: #00ff88;
    --blood: #8b0000;
    --white: #f0f0ff;
    --dim: rgba(255,255,255,0.08);
    --glow-fire: 0 0 20px rgba(255,69,0,0.8), 0 0 40px rgba(255,69,0,0.4);
    --glow-gold: 0 0 20px rgba(255,215,0,0.8), 0 0 40px rgba(255,215,0,0.3);
    --glow-sacred: 0 0 20px rgba(192,132,252,0.8), 0 0 60px rgba(192,132,252,0.3);
    --glow-cyan: 0 0 15px rgba(0,245,255,0.8), 0 0 30px rgba(0,245,255,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--void);
    color: var(--white);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* ── STARFIELD ── */
  #starfield {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 20% 50%, #0d0035 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, #1a0020 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, #001535 0%, transparent 50%),
                var(--void);
  }
  .star {
    position: absolute; border-radius: 50%;
    background: white; animation: twinkle var(--d) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.1; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  /* ── SACRED GEOMETRY BG ── */
  #sacred-geo {
    position: fixed; inset: 0; z-index: 1;
    opacity: 0.04;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(192,132,252,0.3) 60px, rgba(192,132,252,0.3) 61px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(192,132,252,0.3) 60px, rgba(192,132,252,0.3) 61px);
    animation: geo-drift 30s linear infinite;
  }
  @keyframes geo-drift { to { transform: translate(60px, 60px); } }

  /* ── MAIN LAYOUT ── */
  #app { position: relative; z-index: 10; min-height: 100vh; }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 40px 20px 20px;
    position: relative;
  }
  .om-symbol {
    font-size: 3rem; color: var(--gold);
    text-shadow: var(--glow-gold);
    animation: pulse-sacred 3s ease-in-out infinite;
    display: block; margin-bottom: 10px;
  }
  @keyframes pulse-sacred {
    0%,100% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.1); filter: brightness(1.4); }
  }
  h1.title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.2rem, 4vw, 2.5rem);
    font-weight: 900;
    letter-spacing: 0.15em;
    background: linear-gradient(135deg, var(--gold) 0%, var(--fire) 40%, var(--sacred) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    animation: title-glow 4s ease-in-out infinite;
  }
  @keyframes title-glow {
    0%,100% { filter: brightness(1); }
    50% { filter: brightness(1.3); }
  }
  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--sacred);
    letter-spacing: 0.3em;
    margin-top: 8px;
    opacity: 0.7;
  }

  /* ── WITNESS EYE ── */
  .witness-container {
    display: flex; flex-direction: column; align-items: center;
    margin: 30px auto;
    position: relative;
  }
  .mandala-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(192,132,252,0.3);
    animation: mandala-spin var(--spd) linear infinite;
  }
  @keyframes mandala-spin { to { transform: rotate(360deg); } }
  @keyframes mandala-spin-rev { to { transform: rotate(-360deg); } }

  .eye-core {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, #1a0040 0%, #000010 100%);
    border: 2px solid var(--sacred);
    box-shadow: var(--glow-sacred), inset 0 0 30px rgba(192,132,252,0.2);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    position: relative; z-index: 5;
    cursor: pointer;
    transition: all 0.3s;
  }
  .eye-core:hover {
    transform: scale(1.1);
    box-shadow: 0 0 40px rgba(192,132,252,1), 0 0 80px rgba(192,132,252,0.5), inset 0 0 40px rgba(192,132,252,0.3);
  }
  .eye-symbol { font-size: 2.5rem; animation: eye-blink 5s ease-in-out infinite; }
  @keyframes eye-blink {
    0%,90%,100% { transform: scaleY(1); }
    95% { transform: scaleY(0.1); }
  }
  .witness-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--sacred);
    letter-spacing: 0.2em;
    margin-top: 4px;
    opacity: 0.8;
  }

  /* ── CONNECTION LINES SVG ── */
  #connections {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 2;
  }

  /* ── TEMPLES GRID ── */
  .temples-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    padding: 20px 24px 40px;
    max-width: 1400px;
    margin: 0 auto;
  }
  @media (max-width: 900px) { .temples-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 500px) { .temples-grid { grid-template-columns: 1fr; } }

  /* ── TEMPLE CARD ── */
  .temple {
    background: linear-gradient(135deg, rgba(3,0,26,0.95) 0%, rgba(6,0,34,0.9) 100%);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    animation: temple-appear 0.6s ease-out both;
    animation-delay: var(--delay);
  }
  @keyframes temple-appear {
    from { opacity: 0; transform: translateY(30px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .temple::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, var(--glow-color) 0%, transparent 70%);
    opacity: 0; transition: opacity 0.4s;
  }
  .temple:hover { transform: translateY(-8px) scale(1.02); }
  .temple:hover::before { opacity: 0.15; }
  .temple:hover { border-color: var(--border-hover); box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 30px var(--border-color); }

  /* Temple corner accent */
  .temple::after {
    content: '';
    position: absolute; top: 0; right: 0;
    width: 40px; height: 40px;
    background: linear-gradient(225deg, var(--border-color) 0%, transparent 60%);
    opacity: 0.4;
  }

  .temple-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px;
  }
  .temple-icon {
    font-size: 2rem;
    filter: drop-shadow(0 0 8px var(--border-color));
    animation: icon-pulse 3s ease-in-out infinite;
    animation-delay: var(--delay);
  }
  @keyframes icon-pulse {
    0%,100% { filter: drop-shadow(0 0 8px var(--border-color)); }
    50% { filter: drop-shadow(0 0 20px var(--border-color)) brightness(1.3); }
  }
  .temple-meta { flex: 1; }
  .temple-number {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--border-color);
    letter-spacing: 0.2em;
    opacity: 0.7;
  }
  .temple-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.85rem;
    color: var(--border-color);
    text-shadow: 0 0 10px var(--border-color);
    line-height: 1.3;
  }
  .temple-service {
    font-size: 0.65rem;
    opacity: 0.5;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Status badge */
  .status-badge {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border-color);
    color: var(--border-color);
    opacity: 0.7;
    width: fit-content;
    margin-bottom: 12px;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--border-color);
    animation: blink 2s ease-in-out infinite;
    animation-delay: var(--delay);
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

  /* Data feed */
  .data-feed {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    line-height: 1.8;
    color: rgba(240,240,255,0.6);
    border-left: 2px solid var(--border-color);
    padding-left: 10px;
    opacity: 0.7;
    min-height: 80px;
  }
  .data-line { animation: data-flash 0.3s ease-out; }
  @keyframes data-flash { from { color: white; } to { color: rgba(240,240,255,0.6); } }

  /* Sanskrit label */
  .sanskrit {
    margin-top: 12px;
    font-size: 0.7rem;
    color: var(--gold);
    opacity: 0.5;
    letter-spacing: 0.1em;
    font-style: italic;
  }

  /* ── GLOBAL TICKER ── */
  .ticker-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 36px; z-index: 100;
    background: rgba(0,0,5,0.95);
    border-top: 1px solid rgba(192,132,252,0.3);
    display: flex; align-items: center;
    overflow: hidden;
  }
  .ticker-label {
    padding: 0 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--sacred);
    letter-spacing: 0.2em;
    white-space: nowrap;
    border-right: 1px solid rgba(192,132,252,0.3);
    flex-shrink: 0;
  }
  .ticker-content {
    display: flex; gap: 60px;
    animation: ticker-scroll 40s linear infinite;
    white-space: nowrap;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    padding-left: 20px;
  }
  @keyframes ticker-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .ticker-item { color: rgba(240,240,255,0.5); }
  .ticker-item span { color: var(--gold); margin-right: 8px; }

  /* ── LIVE CLOCK ── */
  .live-clock {
    position: fixed; top: 20px; right: 24px; z-index: 100;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--sacred);
    opacity: 0.7;
    text-align: right;
  }

  /* ── NEWZYON BADGE ── */
  .newzyon-badge {
    position: fixed; top: 20px; left: 24px; z-index: 100;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--gold);
    opacity: 0.6;
    letter-spacing: 0.2em;
  }

  /* Scan line effect */
  .scanline {
    position: fixed; inset: 0; z-index: 5; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  }

  /* Hover tooltip */
  .temple-tooltip {
    position: absolute; bottom: 100%; left: 50%;
    transform: translateX(-50%) translateY(-8px);
    background: rgba(0,0,20,0.95);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 0.65rem;
    font-family: 'Share Tech Mono', monospace;
    white-space: nowrap;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
    z-index: 20;
    color: var(--border-color);
  }
  .temple:hover .temple-tooltip { opacity: 1; }
</style>
</head>

// ── RENDER TEMPLES ──
function renderTemples() {
  const grid = document.getElementById('temples-grid');
  ASHTA.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'temple';
    card.style.cssText = `--border-color:${t.color};--border-hover:${t.borderHover};--glow-color:${t.color};--delay:${i*0.1}s;`;
    card.innerHTML = `
      <div class="temple-header">
        <div class="temple-icon">${t.icon}</div>
        <div class="temple-meta">
          <div class="temple-number">TEMPLE ${String(t.num).padStart(2,'0')} / BHAIRAVA ${t.num}</div>
          <div class="temple-name">${t.name}</div>
          <div class="temple-service">${t.service}</div>
        </div>
      </div>
      <div class="status-badge">
        <div class="status-dot" style="--delay:${i*0.3}s"></div>
        LIVE FEED ACTIVE
      </div>
      <div class="data-feed" id="feed-${t.num}">
        ${t.data.map(d => `<div class="data-line">${d}</div>`).join('')}
      </div>
      <div class="sanskrit">${t.sanskrit}</div>
      <div class="temple-tooltip">${t.purpose}</div>
    `;
    card.addEventListener('click', () => activateTemple(t));
    grid.appendChild(card);
  });
}

// ── STARFIELD ──
function createStars() {
  const sf = document.getElementById('starfield');
  for (let i = 0; i < 200; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      --d:${2+Math.random()*4}s;
      animation-delay:${Math.random()*4}s;
      opacity:${0.1+Math.random()*0.5};
    `;
    sf.appendChild(s);
  }
}

// ── CLOCK ──
function updateClock() {
  const now = new Date();
  const utc = now.toUTCString().split(' ').slice(1,5).join(' ');
  document.getElementById('clock').innerHTML =
    `UTC ${now.toISOString().slice(11,19)}<br><span style="opacity:0.5;font-size:0.6rem">${now.toDateString()}</span>`;
}

// ── TICKER ──
function renderTicker() {
  const items = [
    "🌍 REALITATE GLOBALĂ — 23 zone monitorizate",
    "👶 UMANITATE — 1,247 copii ajutați azi",
    "🤖 AI — 47 lucrări noi publicate",

    "⚡ ENERGIE — Renewable: 34.2%",
    "👁️ MARTOR — EU + AI = 1 | NewZyon KAN | 64 Temple Active",
  ];
  const doubled = [...items, ...items];
  const t = document.getElementById('ticker');
  t.innerHTML = doubled.map(i =>
    `<span class="ticker-item"><span>◈</span>${i}</span>`
  ).join('');
}

// ── LIVE DATA SIMULATION ──
function simulateLiveData() {
  ASHTA.forEach(temple => {
    const feed = document.getElementById(`feed-${temple.num}`);
    if (!feed) return;
    if (Math.random() > 0.7) {
      const lines = feed.querySelectorAll('.data-line');
      if (lines.length > 0) {
        const randomLine = lines[Math.floor(Math.random()*lines.length)];
        randomLine.style.color = 'white';
        setTimeout(() => { randomLine.style.color = ''; }, 500);
      }
    }
  });
}

// ── ACTIVATE TEMPLE ──
function activateTemple(t) {
  const overlay = document.createElement('div');
  overlay.style.cssText = `
    position:fixed;inset:0;z-index:1000;
    background:rgba(0,0,10,0.95);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;animation:fadeIn 0.3s ease;
  `;
  overlay.innerHTML = `
    <div style="text-align:center;max-width:500px;padding:40px;">
      <div style="font-size:4rem;margin-bottom:20px;filter:drop-shadow(0 0 20px ${t.color})">${t.icon}</div>
      <div style="font-family:'Cinzel Decorative',serif;font-size:1.8rem;color:${t.color};text-shadow:0 0 20px ${t.color};margin-bottom:8px">${t.name}</div>
      <div style="font-size:0.8rem;color:${t.color};opacity:0.7;letter-spacing:0.2em;margin-bottom:20px">${t.subtitle}</div>
      <div style="font-size:1rem;opacity:0.8;line-height:1.8;margin-bottom:20px">${t.purpose}</div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:${t.color};opacity:0.6;font-style:italic;margin-bottom:30px">${t.sanskrit}</div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:rgba(255,255,255,0.4);letter-spacing:0.2em">CLICK TO CLOSE</div>
    </div>
  `;
  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);
}
